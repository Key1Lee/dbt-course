# Safe example only. Copy this structure to ~/.dbt/profiles.yml and supply the
# values through your shell or secret manager. Never commit a private key or its
# passphrase.
airbnb:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('DBT_USER') }}"
      role: TRANSFORM
      private_key: "{{ env_var('PRIVATE_KEY') }}"
      private_key_passphrase: "{{ env_var('PRIVATE_KEY_PASSPHRASE') }}"
      database: AIRBNB
      warehouse: COMPUTE_WH
      schema: "DBT_{{ env_var('DBT_ENV_NAME') | upper | trim }}"
      threads: 4
